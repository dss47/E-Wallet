<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Wallet | Tableau de bord</title>
  <link rel="stylesheet" href="/src/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="/src/views/index.html" class="logo">
        <img src="/assets/e-wallet-logo.avif" alt="Logo E-Wallet">
      </a>
      <ul class="nav-links"></ul>
    </nav>
  </header>

  <main class="dashboard-main">
    <div class="dashboard-container">
      
      <aside class="dashboard-sidebar">
        <nav class="sidebar-nav">
          <ul>
            <li class="active"><a href="#overview"><i class="fas fa-home"></i><span>Vue d'ensemble</span></a></li>
            <li><a href="#transactions"><i class="fas fa-exchange-alt"></i><span>Transactions</span></a></li>
            <li><a href="#cards"><i class="fas fa-credit-card"></i><span>Mes cartes</span></a></li>
            <li><a href="#transfers"><i class="fas fa-paper-plane"></i><span>Transferts</span></a></li>
            <li class="separator"></li>
            <li><a href="#support"><i class="fas fa-headset"></i><span>Aide & Support</span></a></li>
          </ul>
        </nav>
      </aside>

      <div class="dashboard-content">
        
        <section id="overview" class="dashboard-section active">
          <div class="section-header">
            <h2>Bonjour, <span id="greetingName">?</span> !</h2>
            <p class="date-display" id="currentDate"></p>
          </div>

          <div class="summary-cards">
            <div class="summary-card">
              <div class="card-icon blue"><i class="fas fa-wallet"></i></div>
              <div class="card-details">
                <span class="card-label">Solde disponible <br></span>
                <span class="card-value" id="availableBalance">?</span>
              </div>
            </div>
            <div class="summary-card">
              <div class="card-icon green"><i class="fas fa-arrow-up"></i></div>
              <div class="card-details">
                <span class="card-label">Revenus <br></span>
                <span class="card-value" id="monthlyIncome">?</span>
              </div>
            </div>
            <div class="summary-card">
              <div class="card-icon red"><i class="fas fa-arrow-down"></i></div>
              <div class="card-details">
                <span class="card-label">Dépenses <br></span>
                <span class="card-value" id="monthlyExpenses">?</span>
              </div>
            </div>
          </div>

          <div class="quick-actions">
            <h3>Actions rapides</h3>
            <div class="action-buttons">
              <button class="action-btn" id="quickTransfer"><i class="fas fa-paper-plane"></i><span>Transférer</span></button>
              <button class="action-btn" id="quickTopup"><i class="fas fa-plus-circle"></i><span>Recharger</span></button>
              <button class="action-btn" id="quickRequest"><i class="fas fa-hand-holding-usd"></i><span>Demander</span></button>
            </div>
          </div>

          <div class="recent-transactions">
            <h3>Transactions récentes</h3>
            <div class="transactions-list" id="recentTransactionsList"></div>
          </div>
        </section>

        <section id="cards" class="dashboard-section">
          <div class="section-header">
            <h2>Mes cartes</h2>
            <button class="btn btn-secondary" id="addCardBtn"><i class="fas fa-plus"></i> Ajouter</button>
          </div>
          <div class="cards-grid" id="cardsGrid">
            <div class="card-item">
              <div class="card-preview visa">
                <div class="card-number">**** **** **** ****</div>
                <div class="card-holder">Chargement...</div>
              </div>
            </div>
          </div>
        </section>

        <section id="transfer-section" class="transfer-section hidden">
          <div class="section-header">
            <h2>Transfert</h2>
            <button class="btn btn-secondary" id="closeTransferBtn"><i class="fas fa-times"></i></button>
          </div>
          <form id="transferForm" class="transfer-form">
            <div class="form-group">
              <label for="beneficiary"><i class="fas fa-user"></i> Bénéficiaire</label>
              <select id="beneficiary" name="beneficiary" required>
                <option value="" disabled selected>Choisir un bénéficiaire</option>
              </select>
            </div>
            <div class="form-group">
              <label for="sourceCard"><i class="fas fa-credit-card"></i> Depuis ma carte</label>
              <select id="sourceCard" name="sourceCard" required>
                <option value="" disabled selected>Sélectionner une carte</option>
              </select>
            </div>
            <div class="form-group">
              <label for="amount"><i class="fas fa-euro-sign"></i> Montant</label>
              <input type="number" id="amount" name="amount" min="1" step="0.01" required>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
              <button type="button" class="btn btn-secondary" id="cancelTransferBtn">Annuler</button>
              <button type="submit" class="btn btn-primary" id="submitTransferBtn"><i class="fas fa-paper-plane"></i> Transférer</button>
            </div>
          </form>
        </section>

      </div>
    </div>
  </main>

  <script type="module" src="/src/controllers/dashboard.js"></script>
</body>
</html>
