<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Wallet | Connexion</title>
  <link rel="stylesheet" href="/src/css/styles.css">
</head>

<body>
  <header>
    <nav class="navbar">
      <a href="/src/views/index.html" class="logo">
        <img src="/assets/e-wallet-logo.avif" alt="Logo E-Wallet">
      </a>
      <ul class="nav-links">
        <li><a href="/src/views/index.html">Accueil</a></li>
        <li><a href="#">À propos</a></li>
        <li><a href="#">Fonctionnalités</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">
        <h1>Connexion</h1>
        <p>Accédez à votre E-Wallet en toute sécurité et gérez vos transactions en toute confiance.</p>
        <div id="error"> </div>
        <form class="login-form">
          <div class="input-group">
            <input id="mail" type="email" placeholder="Adresse e-mail" required>
          </div>
          <div class="input-group">
            <input id="password" type="password" placeholder="Mot de passe" required>
            <span id="display" class="toggle-password">👁</span>
          </div>
          <p id="result"></p>
          <button id="submitbtn" type="button" class="btn btn-primary">Se connecter</button>
          <p id="helper-text">
            Si vous n'avez pas de compte, vous pouvez toujours en
            <a id="link-to-signin" href="/src/views/signin.html">créer un</a> !
          </p>
        </form>
      </div>
      <div class="hero-image">
        <img src="/assets/e-Wallet6.gif" alt="Illustration de connexion">
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 E-Wallet. Tous droits réservés.</p>
  </footer>
  <script type="module" src="/src/controllers/login.js"></script>
</body>

</html>
