<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Wallet | Inscription</title>
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="/src/views/index.html" class="logo">
        <img src="/assets/e-wallet-logo.avif" alt="Logo E-Wallet">
      </a>
      <ul class="nav-links">
        <li><a href="/src/views/index.html">Accueil</a></li>
        <li><a href="#">À propos</a></li>
        <li><a href="#">Fonctionnalités</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>
  
  <main>
    <section class="hero">
      <div class="hero-content glass-panel" style="padding: 40px;">
        <h1 style="font-size: 2.5rem;">S'inscrire</h1>
        <p>Rejoignez le futur de la finance. Créez votre compte E-Wallet en quelques secondes.</p>
        <div id="error" style="color: #f87171; margin-bottom: 10px;"></div>
        
        <form class="login-form" id="signupForm">
          <div class="input-group">
            <input id="name" type="text" placeholder="Nom complet" required>
          </div>
          <div class="input-group">
            <input id="mail" type="email" placeholder="Adresse e-mail" required>
          </div>
          <div class="input-group">
            <input id="password" type="password" placeholder="Mot de passe" required>
            <span class="toggle-password">👁</span>
          </div>
          <div class="input-group">
            <input id="confirm-password" type="password" placeholder="Confirmer le mot de passe" required>
          </div>
          <p id="result"></p>
          <button id="signupBtn" type="button" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Créer mon compte</button>
        </form>
        
        <p style="margin-top: 20px; font-size: 0.9rem; text-align: center; color: #94a3b8;">
          Vous avez déjà un compte ?
          <a href="/src/views/login.html" style="color:#818cf8; font-weight:600; text-decoration: none;">Se connecter</a>
        </p>
      </div>
      <div class="hero-image">
        <img src="/assets/e-Wallet6.gif" alt="Illustration d'inscription">
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 E-Wallet. Tous droits réservés.</p>
  </footer>
  <script type="module" src="/src/controllers/signup.js"></script>
</body>
</html>
